<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중2 YBM 박준언 · 영어 학습</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="중2 영어">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Noto Sans KR', sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
  padding-bottom: 40px;
}
.header {
  background: #fff;
  border-bottom: 1px solid #e5e5e5;
  padding: 28px 20px 20px;
  text-align: center;
}
.header .sub { font-size: 12px; color: #86868b; margin-bottom: 4px; }
.header h1 { font-size: 24px; font-weight: 700; }
.header h1 em { color: #5856d6; font-style: normal; }
.header .badge {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 10px; background: #f2f2f7;
  border-radius: 20px; padding: 4px 12px;
  font-size: 11px; color: #86868b;
}
.section-label {
  font-size: 11px; font-weight: 700; color: #86868b;
  text-transform: uppercase; letter-spacing: 1px;
  padding: 20px 20px 10px;
  max-width: 520px; margin: 0 auto;
}
.list { max-width: 520px; margin: 0 auto; padding: 0 16px; }
.lesson-card {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 16px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
  text-decoration: none;
  color: inherit;
  -webkit-tap-highlight-color: transparent;
}
.lesson-card:active { opacity: .7; }
.card-ico {
  width: 50px; height: 50px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.card-info { flex: 1; }
.card-info .num { font-size: 11px; color: #86868b; margin-bottom: 2px; }
.card-info .title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.card-info .desc { font-size: 12px; color: #86868b; }
.card-badge {
  font-size: 10px; font-weight: 700;
  padding: 4px 9px; border-radius: 10px;
  white-space: nowrap; flex-shrink: 0;
}
.card-arr { font-size: 16px; color: #c7c7cc; flex-shrink: 0; }
.lesson-card.locked { opacity: .5; pointer-events: none; }
.coming-soon { text-align: center; padding: 20px; font-size: 12px; color: #aeaeb2; }
</style>
</head>
<body>

<div class="header">
  <p class="sub">중학교 2학년 영어 YBM 박준언</p>
  <h1><em>영어</em> 학습앱</h1>
  <div class="badge">📚 과별 학습 · 어휘 · 문법 · 독해</div>
</div>

<div class="section-label">학습 목록</div>

<div class="list">

  <a class="lesson-card" href="./ybm2-lesson1.html">
    <div class="card-ico" style="background:#ede9fe">📖</div>
    <div class="card-info">
      <div class="num">1과</div>
      <div class="title">Know Me, Know You</div>
      <div class="desc">어휘 · 문법 · 대화문 · 본문</div>
    </div>
    <span class="card-badge" style="background:#ede9fe;color:#5856d6">학습 가능</span>
    <span class="card-arr">›</span>
  </a>

  <div class="lesson-card locked">
    <div class="card-ico" style="background:#f2f2f7">🔒</div>
    <div class="card-info">
      <div class="num">2과</div>
      <div class="title">준비 중</div>
      <div class="desc">곧 업로드 예정</div>
    </div>
    <span class="card-badge" style="background:#f2f2f7;color:#aeaeb2">준비 중</span>
  </div>

  <div class="lesson-card locked">
    <div class="card-ico" style="background:#f2f2f7">🔒</div>
    <div class="card-info">
      <div class="num">3과</div>
      <div class="title">준비 중</div>
      <div class="desc">곧 업로드 예정</div>
    </div>
    <span class="card-badge" style="background:#f2f2f7;color:#aeaeb2">준비 중</span>
  </div>

  <div class="coming-soon">새 과가 추가되면 자동으로 나타나요</div>
</div>

</body>
</html>
